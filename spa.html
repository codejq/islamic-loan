<html dir="rtl" style="direction: rtl">
  <head>
    <meta http-equiv="PRAGMA" content="NO-CACHE" />
    <meta http-equiv="EXPIRES" content="-1" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <meta name="author" content="codejq@gmail.com" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>كتابة الشعار علي الصور</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
      integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.rtl.min.css"
      integrity="sha384-gXt9imSW0VcJVHezoNQsP+TNrjYXoGcrqBZJpry9zJt8PCQjobwmhMGaDHTASo9N"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    <style>
      body,
      .navbar-brand,
      .btn,
      .form-check-label,
      p,
      label {
        font-family: "Noto Kufi Arabic", sans-serif !important;
      }
    </style>
  </head>
  <body style="direction: rtl">
    <nav
      class="navbar text-white sticky-top"
      style="direction: rtl; background-color: #28739b; color: #ffffff"
    >
      <a href="index.html" class="navbar-brand" style="color: #ffffff">
        <strong>كتابة الشعار علي الصور</strong>
      </a>

      <img
        src="./images/1.svg"
        width="100"
        class="d-inline-block align-top"
        alt=""
      />
    </nav>

    <!-- ======= Menu Section ======= -->
    <section id="menu" class="menu section-bg">
      <div class="container" data-aos="fade-up">
        <div class="row" data-aos="fade-up" data-aos-delay="100">
          <div class="col-md-12 p-3">
            <p>
              اختر الصورة من هنا
              <input
                type="file"
                id="UploadImageInput"
                name="UploadImageInput"
                value="#27739b"
                onkeyup="ChangeOrginalImage()"
                onchange="ChangeOrginalImage()"
                onclick="ChangeOrginalImage()"
                onpropertychanged="ChangeOrginalImage();"
                multiple
              />
            </p>
            <div class="row">
              <div class="col-md-4">
                <p>حجم الشعار:</p>

                <div class="form-check">
                  <input
                    class="form-check-input"
                    value="100x100"
                    type="radio"
                    checked="checked"
                    name="logoSize"
                    id="logoSize2"
                  />
                  <label class="form-check-label" for="logoSize2">
                    100x100
                  </label>
                </div>
              </div>
              <div class="col-md-4">
                <p>موقع الشعار:</p>

                <div class="form-check">
                  <input
                    class="form-check-input"
                    value="1"
                    type="radio"
                    checked="checked"
                    name="logoPos"
                    id="logoPos2"
                  />
                  <label class="form-check-label" for="logoPos2">
                    اعلي يسار
                  </label>
                </div>
              </div>

              <div class="col-md-4">
                <p>لون الشعار:</p>

                <div class="form-check">
                  <input
                    class="form-check-input"
                    value="./images/2.png"
                    checked
                    type="radio"
                    name="logoColor"
                    id="logoColor2"
                  />
                  <label
                    class="form-check-label"
                    for="logoColor2"
                    style="background: #000000"
                  >
                    <img src="./images/2.png" height="50" />
                  </label>
                </div>
              </div>
            </div>

            <div id="photoResult" class="row">
              <img id="logo" src="" style="display: none" />
              <img
                id="originalImage"
                onload="UploadImage()"
                stylez="display:none;position:absolute"
              />
              <div class="d-flex gap-2 justify-content-center w-100 p-2">
                <button
                  class="btn btn-success p-2"
                  onclick="
                    DownloadImage();
                    return false;
                  "
                >
                  تحميل الصورة لجهازك
                </button>
                <button
                  class="btn btn-danger p-2"
                  onclick="
                    ResetImages();
                    return false;
                  "
                >
                  أبدأ من جديد
                </button>
              </div>
            </div>

            <div id="arrayofphoto" style="display: none" class="row"></div>
          </div>
          <div class="col-md-12 text-center p-3">
            <canvas
              class="img-fluid"
              id="myCanvas"
              width="600"
              height="600"
            ></canvas>
          </div>
        </div>
      </div>

      <div class="col-md-12">
        <hr />
        <p>&nbsp;</p>
      </div>
    </section>

    <footer
      class="navbar fixed-bottom"
      style="background-color: #28739b; color: #ffffff"
    >
      <div class="container">
        <div class="copyright" style="color: #ffffff">جميع الحقوق محفوظة ©</div>
      </div>
    </footer>
    <!-- End Footer -->

    <script src="./js/script.js"></script>
  </body>
</html>
